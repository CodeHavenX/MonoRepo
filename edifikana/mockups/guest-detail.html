<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Guest Detail</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="guest-list.html" class="top-bar__back">&larr;</a>
        <span class="top-bar__title">Guest Detail</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Avatar & Name -->
          <div class="flex-col items-center text-center mb-6 pt-4">
            <div class="avatar avatar--xl mb-3">JW</div>
            <div class="text-h1">James Wilson</div>
          </div>

          <!-- Info Card -->
          <div class="card mb-4">
            <div class="info-row">
              <span class="info-row__label">Phone</span>
              <span class="info-row__value">(555) 123-4567</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Email</span>
              <span class="info-row__value">james@email.com</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Unit</span>
              <a href="unit-detail.html" class="info-row__value text-link">204</a>
            </div>
            <div class="info-row">
              <span class="info-row__label">Check-In</span>
              <span class="info-row__value">Feb 6, 2025</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Expected Check-Out</span>
              <span class="info-row__value">Feb 10, 2025</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Status</span>
              <span class="badge badge-success">Checked In</span>
            </div>
          </div>

          <!-- Check Out Button -->
          <a href="guest-checkout.html" class="btn btn-danger btn--full-width">Check Out</a>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
