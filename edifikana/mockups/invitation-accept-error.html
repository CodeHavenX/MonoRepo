<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Accept Invitation (Error)</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: var(--space-10);">
          <div class="auth-logo">Edifikana</div>
          <h1 class="text-h1 mb-6">You&rsquo;ve been invited!</h1>

          <div class="auth-form">
            <div class="card mb-4" style="background: var(--color-error-100); border: 1px solid var(--color-error-500);">
              <p class="text-small" style="color: var(--color-error-500);">
                Something went wrong. The invitation may have expired or already been used.
                Please contact the person who sent it and ask for a new invitation.
              </p>
            </div>
            <div class="form-group">
              <a href="sign-in.html" class="btn btn-secondary btn--full-width">Go Back</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
