<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Archive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--clr-bg-page-white);">

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-top">
      <h1 class="page-hero-title">Archive</h1>
      <div class="search-bar">
        <span class="icon-search">🔍</span>
        <input type="search" value="spring" placeholder="Search archive…">
        <span class="icon-refresh">↻</span>
      </div>
    </div>
  </div>
</div>

<div class="content-container">

  <div class="flyer-grid">

    <!-- Archive card 1 -->
    <div class="flyer-card status-archived">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-overlay">
        <div class="flyer-card-title">Spring Festival 2026</div>
        <div class="flyer-card-meta">Expired Mar 20</div>
      </div>
    </div>

    <!-- Archive card 2 -->
    <div class="flyer-card status-archived">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-overlay">
        <div class="flyer-card-title">Garage Sale – April 5</div>
        <div class="flyer-card-meta">Expired Apr 5</div>
      </div>
    </div>

    <!-- Archive card 3 -->
    <div class="flyer-card status-archived">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-overlay">
        <div class="flyer-card-title">Community Cleanup Day</div>
        <div class="flyer-card-meta">Expired Mar 1</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
