<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Moderation Queue</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--clr-bg-page-white);">

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-top">
      <h1 class="page-hero-title">Moderation Queue</h1>
      <span class="badge badge-pending">2 pending</span>
    </div>
  </div>
</div>

<div class="content-container">
  <div class="mod-list">

    <!-- Item 1 -->
    <div class="mod-item">
      <div class="mod-thumbnail"></div>
      <div class="mod-info">
        <div class="mod-title">Neighborhood Watch Meeting</div>
        <div class="mod-desc">Join us to discuss safety improvements in our area. All welcome.</div>
        <div class="mod-meta">
          <span class="mod-meta-item">👤 user1</span>
          <span class="mod-meta-item">📅 2026-04-14</span>
          <span class="mod-meta-item">⏱ 2 days ago</span>
        </div>
        <div class="mod-actions">
          <button class="btn btn-success">Approve</button>
          <button class="btn btn-danger">Reject</button>
        </div>
      </div>
    </div>

    <div class="mod-divider"></div>

    <!-- Item 2 -->
    <div class="mod-item">
      <div class="mod-thumbnail"></div>
      <div class="mod-info">
        <div class="mod-title">Piano Lessons Available</div>
        <div class="mod-desc">Experienced teacher offering lessons for all ages and skill levels.</div>
        <div class="mod-meta">
          <span class="mod-meta-item">👤 user2</span>
          <span class="mod-meta-item">📅 2026-04-13</span>
          <span class="mod-meta-item">⏱ 3 days ago</span>
        </div>
        <div class="mod-actions">
          <button class="btn btn-success">Approve</button>
          <button class="btn btn-danger">Reject</button>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
