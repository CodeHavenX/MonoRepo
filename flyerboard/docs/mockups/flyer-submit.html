<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — New Flyer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-centered">
  <div class="card-panel">
    <div class="card-panel-accent"></div>
    <div class="card-panel-body">

      <h1 class="form-title">New Flyer</h1>
      <p class="form-subtitle">Upload your design and reach the neighborhood.</p>

      <div class="upload-zone">
        <span class="upload-icon">☁️</span>
        <p class="upload-text">Drag &amp; drop your image or PDF here, or click to browse</p>
        <p class="upload-hint">Max file size: 10MB</p>
      </div>

      <div class="input-labeled mb-4">
        <input class="input-rect" type="text" placeholder="Title">
      </div>

      <div class="input-labeled mb-4">
        <textarea class="input-rect textarea" placeholder="Description"></textarea>
      </div>

      <div class="input-labeled mb-4">
        <input class="input-rect" type="text" placeholder="Expires on (optional)">
      </div>
      <p class="input-hint mb-6">Flyer will be archived after this date.</p>

      <button class="btn btn-primary btn-block">Submit for Review</button>
      <button class="btn btn-outline btn-block">Cancel</button>

    </div>
  </div>
</div>

</body>
</html>
