<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Change Password</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="resident-profile.html" class="top-bar__back">&larr; Change Password</a>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Current Password -->
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" class="input" placeholder="Enter current password">
          </div>

          <!-- New Password -->
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" class="input" placeholder="Enter new password">
          </div>

          <!-- Confirm New Password -->
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="input" placeholder="Confirm new password">
          </div>

          <!-- Password Hint -->
          <p class="text-caption text-muted mb-6">At least 8 characters with a number and symbol</p>

          <!-- Update Button -->
          <button class="btn btn-primary btn--full-width">Update Password</button>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="resident-home.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Home</a>
        <a href="my-requests.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9998;</span>Requests</a>
        <a href="my-documents.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#128196;</span>Documents</a>
        <a href="resident-profile.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#128100;</span>Profile</a>
      </nav>

    </div>
  </div>
</body>
</html>
