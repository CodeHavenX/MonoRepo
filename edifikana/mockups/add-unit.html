<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Add Unit</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="property-detail.html" class="top-bar__back">&times;</a>
        <span class="top-bar__title">Add Unit</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <form>
            <div class="form-group">
              <label class="form-label" for="unit-number">Unit Number</label>
              <input type="text" id="unit-number" class="input" placeholder="e.g. 101">
            </div>

            <div class="form-group">
              <label class="form-label" for="floor">Floor</label>
              <input type="text" id="floor" class="input" placeholder="e.g. 1st">
            </div>

            <div class="form-group">
              <label class="form-label" for="bedrooms">Bedrooms</label>
              <select id="bedrooms" class="select">
                <option value="" disabled selected>Select bedrooms</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="bathrooms">Bathrooms</label>
              <select id="bathrooms" class="select">
                <option value="" disabled selected>Select bathrooms</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="sqft">Square Feet</label>
              <input type="number" id="sqft" class="input" placeholder="e.g. 850">
            </div>

            <button type="submit" class="btn btn-primary btn--full-width mt-4">Save Unit</button>
          </form>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
