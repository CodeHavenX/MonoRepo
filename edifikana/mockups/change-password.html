<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Change Password</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="profile.html" class="top-bar__back">&#10005;</a>
        <span class="top-bar__title">Change Password</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Screen Content -->
      <div class="screen-content">
        <div class="px-4 py-3" style="display:flex; flex-direction:column; gap:16px;">

          <!-- Form Fields -->
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" class="input" placeholder="Enter current password">
          </div>

          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" class="input" placeholder="Enter new password">
          </div>

          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="input" placeholder="Confirm new password">
            <p class="form-hint text-caption text-muted" style="margin-top: 8px;">At least 8 characters with a number and symbol</p>
          </div>

          <!-- Update Button -->
          <button class="btn btn-primary btn--full-width">Update Password</button>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
