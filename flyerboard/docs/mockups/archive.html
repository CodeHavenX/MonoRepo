<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Archive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--clr-bg-page);">

<div style="padding: var(--sp-6) var(--sp-6) var(--sp-12);">

  <div class="search-bar">
    <span class="icon-search">🔍</span>
    <input type="search" value="spring" placeholder="Search archive…">
    <span class="icon-refresh">↻</span>
  </div>

  <div class="flyer-grid">

    <!-- Archive card 1 -->
    <div class="flyer-card">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-body">
        <div class="flyer-card-title">Spring Festival 2026</div>
        <div class="flyer-card-desc">A celebration of spring with music, food, and fun. Already ended.</div>
        <div><span class="expire-chip">Expires: 2026-03-20</span></div>
      </div>
    </div>

    <!-- Archive card 2 -->
    <div class="flyer-card">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-body">
        <div class="flyer-card-title">Garage Sale – April 5</div>
        <div class="flyer-card-desc">Tools, furniture, and household items for sale.</div>
        <div><span class="expire-chip">Expires: 2026-04-05</span></div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
