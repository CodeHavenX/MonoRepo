<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Guest Check-Out</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="guest-list.html" class="top-bar__back">&times;</a>
        <span class="top-bar__title">Guest Check-Out</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Guest Info Card -->
          <div class="card mb-4">
            <div class="flex items-center gap-3 mb-3">
              <div class="avatar avatar--lg">JW</div>
              <div>
                <div class="text-body text-bold">James Wilson</div>
                <div class="text-small text-secondary">Unit 204</div>
              </div>
            </div>
            <div class="divider"></div>
            <div class="info-row">
              <span class="info-row__label">Checked In</span>
              <span class="info-row__value">Feb 6, 2025</span>
            </div>
          </div>

          <!-- Check-Out Date -->
          <div class="form-group">
            <label class="form-label">Check-Out Date</label>
            <input type="date" class="input" value="2025-02-08">
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="textarea" placeholder="Any notes about the check-out..."></textarea>
          </div>

          <!-- Submit -->
          <button class="btn btn-primary btn--full-width">Confirm Check-Out</button>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
