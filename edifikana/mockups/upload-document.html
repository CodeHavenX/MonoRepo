<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Upload Document</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="document-library.html" class="top-bar__back">&#10005;</a>
        <span class="top-bar__title">Upload Document</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Screen Content -->
      <div class="screen-content">
        <div class="px-4 py-3">

          <!-- Document Title -->
          <div class="form-group">
            <label class="form-label">Document Title</label>
            <input type="text" class="input" placeholder="Enter document title">
          </div>

          <!-- Document Type -->
          <div class="form-group">
            <label class="form-label">Document Type</label>
            <select class="select">
              <option value="" disabled selected>Select type</option>
              <option value="lease">Lease</option>
              <option value="contract">Contract</option>
              <option value="inspection">Inspection Report</option>
              <option value="insurance">Insurance</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Property -->
          <div class="form-group">
            <label class="form-label">Property</label>
            <select class="select">
              <option value="" disabled selected>Select property</option>
              <option value="sunset">Sunset Apartments</option>
              <option value="oak">Oak Street Condos</option>
              <option value="maple">Maple Heights</option>
            </select>
          </div>

          <!-- Unit (optional) -->
          <div class="form-group">
            <label class="form-label">Unit <span class="text-muted">(optional)</span></label>
            <select class="select">
              <option value="all">All</option>
              <option value="101">Unit 101</option>
              <option value="204">Unit 204</option>
              <option value="305">Unit 305</option>
            </select>
          </div>

          <!-- File Upload Area -->
          <div class="form-group">
            <label class="form-label">File</label>
            <div class="card flex-center" style="min-height: 120px; border: 2px dashed var(--color-border-medium); background-color: var(--color-bg-warm); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer;">
              <span style="font-size: 32px; color: var(--color-text-muted);">&#128206;</span>
              <span class="text-secondary text-small">Tap to select file</span>
            </div>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="textarea" placeholder="Add any notes about this document..."></textarea>
          </div>

          <!-- Upload Button -->
          <button class="btn btn-primary btn--full-width">Upload Document</button>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
