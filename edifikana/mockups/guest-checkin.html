<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Guest Check-In</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="guest-list.html" class="top-bar__back">&times;</a>
        <span class="top-bar__title">Guest Check-In</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Unit Info Card -->
          <div class="card mb-4">
            <div class="flex items-center gap-3">
              <div class="list-item__icon">&#9962;</div>
              <div>
                <div class="text-body text-bold">Unit 204</div>
                <div class="text-small text-secondary">Sunset Apartments</div>
              </div>
            </div>
          </div>

          <!-- Form -->
          <div class="form-group">
            <label class="form-label">Guest Name</label>
            <input type="text" class="input" placeholder="Full name">
          </div>

          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="input" placeholder="(555) 000-0000">
          </div>

          <div class="form-group">
            <label class="form-label">Email <span class="text-muted">(optional)</span></label>
            <input type="email" class="input" placeholder="guest@email.com">
          </div>

          <div class="form-group">
            <label class="form-label">Check-In Date</label>
            <input type="date" class="input" value="2025-02-08">
          </div>

          <div class="form-group">
            <label class="form-label">Expected Check-Out Date</label>
            <input type="date" class="input">
          </div>

          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="textarea" placeholder="Any additional notes..."></textarea>
          </div>

          <!-- Submit -->
          <button class="btn btn-primary btn--full-width">Check In Guest</button>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
