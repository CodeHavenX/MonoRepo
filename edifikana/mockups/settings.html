<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Settings</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar__title">Settings</span>
      </div>

      <!-- Screen Content -->
      <div class="screen-content">
        <div class="px-4 py-3" style="display:flex; flex-direction:column; gap:16px;">

          <!-- Organization Card -->
          <a href="my-organizations.html" class="org-card">
            <div class="org-card__icon">&#9962;</div>
            <div class="org-card__info">
              <div class="org-card__name">Sunrise Property Management</div>
              <div class="org-card__meta">Admin &middot; 12 properties</div>
            </div>
            <div class="org-card__arrow">&rsaquo;</div>
          </a>

          <div class="divider"></div>

          <!-- Settings Menu -->
          <div class="list-group">

            <a href="profile.html" class="list-item">
              <div class="list-item__icon">&#128100;</div>
              <div class="list-item__content">
                <div class="list-item__title">Profile</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>

            <a href="team-management.html" class="list-item">
              <div class="list-item__icon">&#128101;</div>
              <div class="list-item__content">
                <div class="list-item__title">Team Management</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>

            <a href="document-library.html" class="list-item">
              <div class="list-item__icon">&#128196;</div>
              <div class="list-item__content">
                <div class="list-item__title">Documents</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>

            <a href="notification-preferences.html" class="list-item">
              <div class="list-item__icon">&#128276;</div>
              <div class="list-item__content">
                <div class="list-item__title">Notifications</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>

            <a href="delete-account.html" class="list-item">
              <div class="list-item__icon">&#128465;</div>
              <div class="list-item__content">
                <div class="list-item__title">Delete Account</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>

          </div>

          <div class="divider"></div>

          <!-- Sign Out -->
          <div class="list-group">
            <a href="sign-in.html" class="list-item">
              <div class="list-item__content">
                <div class="list-item__title text-error">Sign Out</div>
              </div>
            </a>
          </div>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
