<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Accept Invitation</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: var(--space-10);">
          <div class="auth-logo">Edifikana</div>
          <h1 class="text-h1 mb-6">You&rsquo;ve been invited!</h1>

          <div class="auth-form">

            <!--
              This screen only routes the user to real auth — it never collects credentials
              itself, and it deliberately shows no org/role/inviter details: there is no
              unauthenticated endpoint to resolve an invite token to those details. Sign-up
              (with OTP verification) and sign-in are handled by sign-up.html / sign-in.html,
              which carry the invite context forward and land the user back on
              invitation-accept-authenticated.html once a session exists.
            -->
            <p class="text-body text-secondary mb-6">
              You&rsquo;ve been invited to join an organization on Edifikana. Sign in or create an account to accept this invitation.
            </p>

            <div class="form-group">
              <a href="sign-up.html" class="btn btn-primary btn--full-width">Create Account</a>
            </div>
            <div class="form-group">
              <a href="sign-in.html" class="btn btn-secondary btn--full-width">Sign In</a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
