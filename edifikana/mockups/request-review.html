<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Pending Requests</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="task-list.html" class="top-bar__back">&larr;</a>
        <span class="top-bar__title">Pending Requests</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <div class="flex-col gap-3">

            <!-- Request 1 -->
            <div class="card">
              <div class="flex-between mb-2">
                <div class="text-h3">AC not working</div>
                <span class="badge badge-error">High</span>
              </div>
              <div class="text-small text-secondary mb-1">From: Maria Garcia &middot; Unit 305</div>
              <div class="text-caption text-muted mb-3">2 hours ago</div>
              <div class="flex gap-3">
                <a href="add-task.html" class="btn btn-primary btn--small">Approve</a>
                <button class="btn btn-text btn--small">Reject</button>
              </div>
            </div>

            <!-- Request 2 -->
            <div class="card">
              <div class="flex-between mb-2">
                <div class="text-h3">Leaking faucet</div>
                <span class="badge badge-warning">Medium</span>
              </div>
              <div class="text-small text-secondary mb-1">From: John Smith &middot; Unit 101</div>
              <div class="text-caption text-muted mb-3">1 day ago</div>
              <div class="flex gap-3">
                <a href="add-task.html" class="btn btn-primary btn--small">Approve</a>
                <button class="btn btn-text btn--small">Reject</button>
              </div>
            </div>

            <!-- Request 3 -->
            <div class="card">
              <div class="flex-between mb-2">
                <div class="text-h3">Light out in hallway</div>
                <span class="badge badge-info">Low</span>
              </div>
              <div class="text-small text-secondary mb-1">From: Sarah Lee &middot; Unit 410</div>
              <div class="text-caption text-muted mb-3">3 days ago</div>
              <div class="flex gap-3">
                <a href="add-task.html" class="btn btn-primary btn--small">Approve</a>
                <button class="btn btn-text btn--small">Reject</button>
              </div>
            </div>

          </div>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
