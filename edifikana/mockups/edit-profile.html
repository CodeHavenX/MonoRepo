<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Edit Profile</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="profile.html" class="top-bar__back">&#10005;</a>
        <span class="top-bar__title">Edit Profile</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Screen Content -->
      <div class="screen-content">
        <div class="px-4 py-3" style="display:flex; flex-direction:column; gap:16px;">

          <!-- Avatar Section -->
          <div style="display:flex; flex-direction:column; align-items:center; gap:8px; padding-top:8px; padding-bottom:8px;">
            <div class="avatar avatar--xl">AU</div>
            <a href="#" class="text-link text-small">Change Photo</a>
          </div>

          <!-- Form Fields -->
          <div class="form-group">
            <label class="form-label">Display Name</label>
            <input type="text" class="input" value="Admin User">
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="input" value="admin@email.com">
          </div>

          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="input" value="(555) 000-1234">
          </div>

          <!-- Save Button -->
          <button class="btn btn-primary btn--full-width">Save Changes</button>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
