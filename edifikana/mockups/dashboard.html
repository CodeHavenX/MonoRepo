<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Dashboard</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar__title">Edifikana</span>
        <div class="top-bar__actions">
          <button class="top-bar__icon-btn" aria-label="Notifications">&#128276;</button>
        </div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Metric Cards Grid -->
          <div class="grid-2 mb-4">
            <a href="property-list.html" class="metric-card metric-card--clickable">
              <div class="metric-card__value">12</div>
              <div class="metric-card__label">Properties</div>
            </a>
            <div class="metric-card">
              <div class="metric-card__value">47</div>
              <div class="metric-card__label">Units</div>
            </div>
            <a href="task-list.html" class="metric-card metric-card--warning metric-card--clickable">
              <div class="metric-card__value">8</div>
              <div class="metric-card__label">Pending Tasks</div>
            </a>
            <div class="metric-card metric-card--error">
              <div class="metric-card__value">3</div>
              <div class="metric-card__label">Overdue Payments</div>
            </div>
          </div>

          <!-- Pending Tasks Section -->
          <div class="section-header">
            <span>Pending Tasks</span>
          </div>

          <div class="flex-col gap-3 mt-2">
            <a href="task-detail.html" class="task-card task-card--high card--clickable" style="display:block; text-decoration:none; color:inherit;">
              <div class="task-card__title">Fix AC - Unit 204</div>
              <div class="task-card__meta">
                <span class="badge badge-error" style="margin-right:8px;">High</span>
                Due: Today
              </div>
            </a>

            <a href="task-detail.html" class="task-card task-card--medium card--clickable" style="display:block; text-decoration:none; color:inherit;">
              <div class="task-card__title">Replace light bulbs - Lobby</div>
              <div class="task-card__meta">
                <span class="badge badge-warning" style="margin-right:8px;">Medium</span>
                Due: Tomorrow
              </div>
            </a>

            <a href="task-detail.html" class="task-card task-card--low card--clickable" style="display:block; text-decoration:none; color:inherit;">
              <div class="task-card__title">Inspect fire extinguisher</div>
              <div class="task-card__meta">
                <span class="badge badge-success" style="margin-right:8px;">Low</span>
                Due: Mar 5
              </div>
            </a>
          </div>

        </div>
      </div>

      <!-- FAB -->
      <a href="add-task.html" class="fab" aria-label="Add task">+</a>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
