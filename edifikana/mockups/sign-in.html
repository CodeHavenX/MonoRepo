<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Sign In</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout">
          <div class="auth-logo">Edifikana</div>
          <div class="auth-subtitle">Property Management</div>

          <!--
            Invite context banner — shown only when this screen is reached from
            invitation-accept.html (i.e. the user tapped an invitation link and already has
            an account). Hidden for the normal Sign In entry point. Kept generic (no org name)
            since there's no unauthenticated endpoint to resolve invite details from the token yet.
          -->
          <div class="card mb-4" style="background: var(--color-info-100); border-color: var(--color-info-500);">
            <p class="text-small" style="color: var(--color-text-primary);">
              Sign in to accept your invitation.
            </p>
          </div>

          <form class="auth-form">
            <!--
              A user arriving via an invite link returns to
              invitation-accept-authenticated.html after signing in, instead of the normal
              post-login destination.
            -->
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input class="input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            </div>

            <div class="form-group">
              <button type="submit" class="btn btn-primary btn--full-width">Sign In</button>
            </div>

            <div class="text-center mb-4">
              <a href="password-reset.html" class="text-small text-link">Forgot Password?</a>
            </div>
          </form>

          <div class="auth-footer">
            Don't have an account? <a href="sign-up.html">Sign Up</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
