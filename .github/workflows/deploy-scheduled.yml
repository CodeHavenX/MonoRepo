name: Scheduled Deployment

on:
  schedule:
    - cron: '0 8 * * *'  # midnight PDT
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-containers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and stage container images
      run: ./scripts/build_images.sh
  integ:
    runs-on: self-hosted
    needs: build-containers
    environment: "integ"
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.EDIFIKANA_SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.EDIFIKANA_PROJECT_ID }}
      EDIFIKANA_SUPABASE_URL: ${{ secrets.EDIFIKANA_SUPABASE_URL }}
      EDIFIKANA_SUPABASE_KEY: ${{ secrets.EDIFIKANA_SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - run: scripts/edifikana_link_project.sh
      - name: Run assemble with Gradle
        run: ./gradlew edifikana:back-end:assemble
      - run: scripts/edifikana_push_changes.sh
      - name: Run integration tests with Gradle
        run: ./gradlew edifikana:back-end:integTest --rerun
  deploy-stage:
    runs-on: ubuntu-latest
    needs: integ
    environment: "stage"
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.EDIFIKANA_SUPABASE_DB_PASSWORD }}
      PROJECT_ID: ${{ secrets.EDIFIKANA_PROJECT_ID }}
      EDIFIKANA_SUPABASE_URL: ${{ secrets.EDIFIKANA_SUPABASE_URL }}
      EDIFIKANA_SUPABASE_KEY: ${{ secrets.EDIFIKANA_SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote images to latest
        run: SOURCE_TAG=sha-${GITHUB_SHA} TARGET_TAG=latest ./scripts/promote_images.sh
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: scripts/edifikana_link_project.sh
      - run: scripts/edifikana_push_changes.sh
      - name: Invoke deployment hook
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ vars.WEBHOOK_URL }}
          webhook_auth_type: "bearer"
          webhook_auth: ${{ secrets.WEBHOOK_AUTH }}
