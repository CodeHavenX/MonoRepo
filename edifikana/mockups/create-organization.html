<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Create Organization</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
  <div class="app-layout">
    <nav class="sidebar-nav">
      <div class="sidebar-nav__logo">Edifikana</div>
      <a href="dashboard.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">&#9750;</span> Dashboard</a>
      <a href="property-list.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">&#9962;</span> Properties</a>
      <a href="task-list.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">&#9745;</span> Tasks</a>
      <a href="settings.html" class="sidebar-nav__item sidebar-nav__item--active"><span class="sidebar-nav__icon">&#8943;</span> More</a>
    </nav>

    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="organization-picker.html" class="top-bar__back">&#8592;</a>
        <span class="top-bar__title">Create Organization</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="content-narrow pt-4 pb-6">

          <p class="text-small text-secondary mb-6">Set up a new organization to start managing your properties.</p>

          <!-- Form -->
          <form>

            <!-- Organization Name -->
            <div class="form-group">
              <label class="form-label" for="org-name">Organization Name</label>
              <input type="text" id="org-name" class="input" placeholder="e.g. Sunrise Property Management">
            </div>

            <!-- Organization Type -->
            <div class="form-group">
              <label class="form-label" for="org-type">Organization Type</label>
              <select id="org-type" class="select">
                <option value="" disabled selected>Select a type</option>
                <option value="property-management">Property Management</option>
                <option value="hoa">HOA</option>
                <option value="real-estate">Real Estate</option>
              </select>
            </div>

            <!-- Description -->
            <div class="form-group">
              <label class="form-label" for="org-description">Description <span class="text-muted">(optional)</span></label>
              <textarea id="org-description" class="textarea" placeholder="Briefly describe your organization..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary btn--full-width mt-4">
              Create Organization
            </button>

          </form>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
  </div>
</body>
</html>
