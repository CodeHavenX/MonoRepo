<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Add Property</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="property-list.html" class="top-bar__back">&times;</a>
        <span class="top-bar__title">Add Property</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <form>
            <div class="form-group">
              <label class="form-label" for="property-name">Property Name</label>
              <input type="text" id="property-name" class="input" placeholder="Enter property name">
            </div>

            <div class="form-group">
              <label class="form-label" for="address">Address</label>
              <input type="text" id="address" class="input" placeholder="Enter address">
            </div>

            <div class="form-group">
              <label class="form-label" for="city">City</label>
              <input type="text" id="city" class="input" placeholder="Enter city">
            </div>

            <div class="form-group">
              <label class="form-label" for="property-type">Property Type</label>
              <select id="property-type" class="select">
                <option value="" disabled selected>Select type</option>
                <option value="apartment">Apartment</option>
                <option value="condo">Condo</option>
                <option value="single-family">Single Family</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary btn--full-width mt-4">Save Property</button>
          </form>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
