server {
    listen 80;
    server_name flyerboard.example.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flyerboard.example.com;

    ssl_certificate     /etc/ssl/certs/flyerboard.crt;
    ssl_certificate_key /etc/ssl/private/flyerboard.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve WASM frontend static files
    location / {
        root /var/www/flyerboard;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy API requests to the backend Ktor server
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support file uploads up to 20 MB.
        # This must be >= FLYERBOARD_FLYER_MAX_FILE_SIZE_BYTES in env.example.
        client_max_body_size 20M;
    }
}
