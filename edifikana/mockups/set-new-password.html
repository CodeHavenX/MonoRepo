<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Set New Password</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: var(--space-10);">

          <div class="auth-logo">Edifikana</div>
          <h1 class="text-h1 mb-2">Set new password</h1>
          <p class="text-body text-secondary mb-6" style="text-align: center; max-width: 300px;">
            Create a new password for your account.
          </p>

          <form class="auth-form">
            <div class="form-group">
              <label class="form-label" for="new-password">New Password</label>
              <input class="input" type="password" id="new-password" placeholder="Create a new password" autocomplete="new-password">
            </div>

            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirm Password</label>
              <input class="input" type="password" id="confirm-password" placeholder="Confirm new password" autocomplete="new-password">
            </div>

            <div class="form-group">
              <a href="sign-in.html" class="btn btn-primary btn--full-width">Set Password</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
