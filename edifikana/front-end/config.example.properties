# Copy this file to config.properties (gitignored) and fill in your values.
# config.properties must NOT be committed — it is in .gitignore.

# Edifikana backend API base URL
DEFAULT_API_URL=http://0.0.0.0:9292

# Google OAuth 2.0 Web Client ID (non-sensitive public identifier)
# CI: inject via GitHub secret GOOGLE_OAUTH_CLIENT_ID -> env var -> config.properties
GOOGLE_OAUTH_CLIENT_ID=your-client-id.apps.googleusercontent.com

# Application version string (optional — defaults to app.version in gradle.properties)
APP_VERSION=0.1

# Build type: debug | staging | release
BUILD_TYPE=debug
