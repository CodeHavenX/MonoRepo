<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Team Management</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="settings.html" class="top-bar__back">&#8249; Back</a>
        <span class="top-bar__title">Team Management</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <button class="tab tab--active" data-tab="panel-admins">Admins</button>
        <button class="tab" data-tab="panel-staff">Staff</button>
        <button class="tab" data-tab="panel-pending">Pending</button>
      </div>

      <!-- Screen Content -->
      <div class="screen-content">

        <!-- Admins Panel -->
        <div id="panel-admins" class="tab-panel tab-panel--active">
          <div class="px-4 py-3" style="display:flex; flex-direction:column; gap:12px;">

            <div class="list-group">
              <div class="list-item">
                <div class="avatar avatar--md">AU</div>
                <div class="list-item__content">
                  <div class="list-item__title">Admin User <span class="text-caption text-muted">(You)</span></div>
                  <div class="list-item__subtitle">(555) 000-1234</div>
                </div>
                <div class="list-item__trailing">
                  <span class="badge badge-info">Owner</span>
                </div>
              </div>

              <div class="list-item">
                <div class="avatar avatar--md">JS</div>
                <div class="list-item__content">
                  <div class="list-item__title">Jane Smith</div>
                  <div class="list-item__subtitle">(555) 111-2345</div>
                </div>
                <div class="list-item__trailing">
                  <span class="badge badge-neutral">Admin</span>
                </div>
              </div>
            </div>

            <button class="btn btn-secondary btn--full-width">+ Invite Admin</button>

          </div>
        </div>

        <!-- Staff Panel -->
        <div id="panel-staff" class="tab-panel">
          <div class="px-4 py-3" style="display:flex; flex-direction:column; gap:12px;">

            <div class="list-group">
              <div class="list-item">
                <div class="avatar avatar--md">JM</div>
                <div class="list-item__content">
                  <div class="list-item__title">John M.</div>
                  <div class="list-item__subtitle">(555) 222-3456</div>
                </div>
                <div class="list-item__trailing">
                  <span class="badge badge-neutral">Staff</span>
                </div>
              </div>

              <div class="list-item">
                <div class="avatar avatar--md">MS</div>
                <div class="list-item__content">
                  <div class="list-item__title">Maria S.</div>
                  <div class="list-item__subtitle">(555) 333-4567</div>
                </div>
                <div class="list-item__trailing">
                  <span class="badge badge-neutral">Staff</span>
                </div>
              </div>
            </div>

            <button class="btn btn-secondary btn--full-width">+ Invite Staff</button>

          </div>
        </div>

        <!-- Pending Panel -->
        <div id="panel-pending" class="tab-panel">
          <div class="px-4 py-3" style="display:flex; flex-direction:column; gap:12px;">

            <div class="list-group">
              <div class="list-item" style="flex-wrap: wrap;">
                <div class="avatar avatar--md">B</div>
                <div class="list-item__content">
                  <div class="list-item__title">bob@email.com</div>
                  <div class="list-item__subtitle">Invited as Staff &middot; Sent Feb 1</div>
                </div>
                <div class="list-item__trailing" style="gap: 12px;">
                  <button class="btn btn-text btn--small">Resend</button>
                  <button class="btn btn-text btn--small" style="color: var(--color-error-500);">Cancel</button>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>

  <!-- Tab Switching Script -->
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tab.closest('.tab-bar').querySelectorAll('.tab').forEach(t => t.classList.remove('tab--active'));
        tab.classList.add('tab--active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('tab-panel--active'));
        document.getElementById(target).classList.add('tab-panel--active');
      });
    });
  </script>
</body>
</html>
