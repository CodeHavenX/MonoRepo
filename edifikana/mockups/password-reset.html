<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Reset Password</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="top-bar">
        <a href="sign-in.html" class="top-bar__back">
          &#8592; Back
        </a>
      </div>

      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: 0;">
          <h1 class="text-h1 mb-2">Reset Password</h1>
          <p class="text-body text-secondary mb-6" style="text-align: center; max-width: 320px;">Enter your email and we'll send you a reset link.</p>

          <form class="auth-form">
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
              <button type="submit" class="btn btn-primary btn--full-width">Send Reset Link</button>
            </div>
          </form>

          <div class="auth-footer">
            <a href="sign-in.html">Back to Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
