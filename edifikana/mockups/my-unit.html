<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - My Unit</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="resident-home.html" class="top-bar__back">&larr; My Unit</a>
      </div>

      <div class="screen-content">

        <!-- Unit Header -->
        <div class="px-4 mb-4">
          <h1 class="text-h1 mb-1">Unit 204</h1>
          <div class="text-small text-secondary">Sunset Apartments &middot; 2 bed &middot; 1 bath</div>
        </div>

        <!-- Info Section -->
        <div class="px-4 mb-4">
          <div class="card">
            <div class="info-row">
              <span class="info-row__label">Unit Number</span>
              <span class="info-row__value">204</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Floor</span>
              <span class="info-row__value">2nd</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Bedrooms</span>
              <span class="info-row__value">2</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Bathrooms</span>
              <span class="info-row__value">1</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Sq Ft</span>
              <span class="info-row__value">850</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Move-In Date</span>
              <span class="info-row__value">Jan 1, 2025</span>
            </div>
          </div>
        </div>

        <!-- Financials Card -->
        <div class="px-4 mb-4">
          <a href="financial-overview.html" class="card card--clickable" style="text-decoration:none;">
            <div class="flex-between mb-2">
              <div class="text-h3">Financials</div>
              <span class="badge badge-success">Current</span>
            </div>
            <div class="text-body mb-1">Rent: $1,500/month</div>
            <div class="text-small text-secondary">Next Due: Mar 1, 2025</div>
          </a>
        </div>

        <!-- Guests Card -->
        <div class="px-4 mb-4">
          <a href="guest-list.html" class="card card--clickable" style="text-decoration:none;">
            <div class="text-h3 mb-2">Guests</div>
            <div class="text-body mb-1">1 current guest</div>
            <div class="text-small text-secondary">James Wilson &mdash; checked in Feb 6</div>
          </a>
        </div>

      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="resident-home.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9750;</span>Home</a>
        <a href="my-requests.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9998;</span>Requests</a>
        <a href="my-documents.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#128196;</span>Documents</a>
        <a href="resident-profile.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#128100;</span>Profile</a>
      </nav>

    </div>
  </div>
</body>
</html>
