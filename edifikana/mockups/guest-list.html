<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Guests</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="unit-detail.html" class="top-bar__back">&larr;</a>
        <span class="top-bar__title">Guests - Unit 204</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Filter Chips -->
      <div class="filter-bar">
        <button class="filter-chip filter-chip--active">Current</button>
        <button class="filter-chip">History</button>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Current Guests -->
          <div class="section-header">Current Guests</div>

          <div class="list-group mb-4">
            <a href="guest-detail.html" class="list-item">
              <div class="avatar avatar--md">JW</div>
              <div class="list-item__content">
                <div class="list-item__title">James Wilson</div>
                <div class="list-item__subtitle">Checked in Feb 6, 2025</div>
                <div class="list-item__subtitle">(555) 123-4567</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>
            <a href="guest-detail.html" class="list-item">
              <div class="avatar avatar--md">EB</div>
              <div class="list-item__content">
                <div class="list-item__title">Emily Brown</div>
                <div class="list-item__subtitle">Checked in Feb 7, 2025</div>
                <div class="list-item__subtitle">(555) 987-6543</div>
              </div>
              <div class="list-item__trailing">&rsaquo;</div>
            </a>
          </div>

          <!-- Check In Button -->
          <a href="guest-checkin.html" class="btn btn-primary btn--full-width mb-6">+ Check In Guest</a>

          <!-- History (collapsed) -->
          <div class="section-header">
            <span>History</span>
            <span class="section-header__toggle">&#9662;</span>
          </div>

          <div class="list-group">
            <div class="list-item" style="cursor: default;">
              <div class="avatar avatar--md">RD</div>
              <div class="list-item__content">
                <div class="list-item__title">Robert Davis</div>
                <div class="list-item__subtitle">Jan 20 &ndash; 25, 2025</div>
              </div>
            </div>
            <div class="list-item" style="cursor: default;">
              <div class="avatar avatar--md">LC</div>
              <div class="list-item__content">
                <div class="list-item__title">Lisa Chen</div>
                <div class="list-item__subtitle">Dec 15 &ndash; 18, 2024</div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
