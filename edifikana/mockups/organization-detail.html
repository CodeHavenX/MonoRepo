<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Organization Details</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="my-organizations.html" class="top-bar__back">
          &#8592;
        </a>
        <span class="top-bar__title">Organization Details</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content screen-content--no-nav">
        <div class="px-4 pt-4 pb-6">

          <!-- Large Org Card -->
          <div class="card mb-6">
            <div style="display: flex; align-items: center; gap: var(--space-4);">
              <div class="org-card__icon" style="width: 64px; height: 64px; font-size: 32px;">&#x1F3E2;</div>
              <div>
                <div class="text-h2 text-bold">Sunrise Property Management</div>
                <div style="margin-top: var(--space-2);">
                  <span class="badge badge-success">Active</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Info Section -->
          <div class="card mb-6">
            <div class="info-row">
              <span class="info-row__label">Your Role</span>
              <span class="info-row__value">Admin</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Members</span>
              <span class="info-row__value">8</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Properties</span>
              <span class="info-row__value">12</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Joined</span>
              <span class="info-row__value">Jan 15, 2025</span>
            </div>
          </div>

          <!-- Divider -->
          <div class="divider"></div>

          <!-- Leave Organization Button -->
          <button class="btn btn-danger btn--full-width">
            Leave Organization
          </button>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
