<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — My Flyers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--clr-bg-page-white);">

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-top">
      <h1 class="page-hero-title">My Flyers</h1>
    </div>
  </div>
</div>

<div class="content-container">
  <div class="flyer-grid">

    <!-- Card 1: Approved -->
    <div class="my-flyer-card status-approved">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-top-bar">
        <span class="badge badge-approved">Approved</span>
        <button class="btn btn-sm btn-outline-light">Edit</button>
      </div>
      <div class="flyer-card-overlay">
        <div class="my-flyer-card-title">Community Yard Sale</div>
        <div class="flyer-card-meta">2026-05-01</div>
      </div>
    </div>

    <!-- Card 2: Pending -->
    <div class="my-flyer-card status-pending">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-top-bar">
        <span class="badge badge-pending">Pending</span>
        <button class="btn btn-sm btn-outline-light">Edit</button>
      </div>
      <div class="flyer-card-overlay">
        <div class="my-flyer-card-title">Lost Cat – Please Help</div>
        <div class="flyer-card-meta">Awaiting review</div>
      </div>
    </div>

    <!-- Card 3: Rejected -->
    <div class="my-flyer-card status-rejected">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-top-bar">
        <span class="badge badge-rejected">Rejected</span>
        <button class="btn btn-sm btn-outline-light">Edit</button>
      </div>
      <div class="flyer-card-overlay">
        <div class="my-flyer-card-title">Rejected Flyer</div>
        <div class="flyer-card-meta">Rejected by moderator</div>
      </div>
    </div>

    <!-- Card 4: Archived (no edit button) -->
    <div class="my-flyer-card status-archived">
      <div class="flyer-card-image"></div>
      <div class="flyer-card-top-bar">
        <span class="badge badge-archived">Archived</span>
      </div>
      <div class="flyer-card-overlay">
        <div class="my-flyer-card-title">Old Event Flyer</div>
        <div class="flyer-card-meta">Expired Mar 1</div>
      </div>
    </div>

  </div>
</div>

<button class="fab">+</button>

</body>
</html>
