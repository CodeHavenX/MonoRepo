<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Payment History</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="financial-overview.html" class="top-bar__back">&larr;</a>
        <span class="top-bar__title">Payment History</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Filter Chips -->
      <div class="filter-bar">
        <button class="filter-chip filter-chip--active">All</button>
        <button class="filter-chip">Paid</button>
        <button class="filter-chip">Pending</button>
        <button class="filter-chip">Overdue</button>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Payment List -->
          <div class="list-group">
            <div class="list-item" style="cursor: default;">
              <div class="list-item__content">
                <div class="list-item__title">Feb 2025 &mdash; Rent</div>
                <div class="list-item__subtitle">$1,500 &middot; Due Feb 1</div>
              </div>
              <div class="list-item__trailing">
                <span class="badge badge-warning">Pending</span>
              </div>
            </div>
            <div class="list-item" style="cursor: default;">
              <div class="list-item__content">
                <div class="list-item__title">Jan 2025 &mdash; Rent</div>
                <div class="list-item__subtitle">$1,500 &middot; Paid Jan 1</div>
              </div>
              <div class="list-item__trailing">
                <span class="badge badge-success">Paid</span>
              </div>
            </div>
            <div class="list-item" style="cursor: default;">
              <div class="list-item__content">
                <div class="list-item__title">Jan 2025 &mdash; HOA</div>
                <div class="list-item__subtitle">$350 &middot; Paid Jan 3</div>
              </div>
              <div class="list-item__trailing">
                <span class="badge badge-success">Paid</span>
              </div>
            </div>
            <div class="list-item" style="cursor: default;">
              <div class="list-item__content">
                <div class="list-item__title">Dec 2024 &mdash; Rent</div>
                <div class="list-item__subtitle">$1,500 &middot; Paid Dec 1</div>
              </div>
              <div class="list-item__trailing">
                <span class="badge badge-success">Paid</span>
              </div>
            </div>
            <div class="list-item" style="cursor: default;">
              <div class="list-item__content">
                <div class="list-item__title">Dec 2024 &mdash; HOA</div>
                <div class="list-item__subtitle">$350</div>
              </div>
              <div class="list-item__trailing">
                <span class="badge badge-error">Overdue</span>
              </div>
            </div>
            <div class="list-item" style="cursor: default;">
              <div class="list-item__content">
                <div class="list-item__title">Nov 2024 &mdash; Rent</div>
                <div class="list-item__subtitle">$1,500</div>
              </div>
              <div class="list-item__trailing">
                <span class="badge badge-success">Paid</span>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
