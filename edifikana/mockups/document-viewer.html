<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Document Viewer</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="document-library.html" class="top-bar__back">&#8249; Back</a>
        <span class="top-bar__title">Document</span>
        <div class="top-bar__actions">
          <button class="top-bar__icon-btn" title="Share">&#8689;</button>
        </div>
      </div>

      <!-- Screen Content -->
      <div class="screen-content">
        <div class="px-4 py-3 flex-col gap-4" style="display:flex; flex-direction:column; gap:16px;">

          <!-- Document Title -->
          <h1 class="text-h1">Lease Agreement - Unit 204</h1>

          <!-- Metadata Card -->
          <div class="card">
            <div class="info-row">
              <span class="info-row__label">Type</span>
              <span class="info-row__value">Lease</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Property</span>
              <span class="info-row__value">Sunset Apartments</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Unit</span>
              <span class="info-row__value">204</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Uploaded</span>
              <span class="info-row__value">Jan 15, 2025</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Uploaded By</span>
              <span class="info-row__value">Admin User</span>
            </div>
          </div>

          <!-- Document Preview Placeholder -->
          <div class="card flex-center" style="min-height: 400px; background-color: var(--color-bg-warm); display:flex; align-items:center; justify-content:center;">
            <span class="text-secondary text-body">Document Preview</span>
          </div>

          <!-- Download Button -->
          <a href="#" class="btn btn-secondary btn--full-width">Download</a>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
