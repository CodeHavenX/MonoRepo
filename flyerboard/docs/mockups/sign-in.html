<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Sign In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-centered">
  <div class="card-panel">
    <div class="card-panel-accent"></div>
    <div class="card-panel-body">

      <h1 class="form-title">Welcome back</h1>
      <p class="form-subtitle">Sign in to your account</p>

      <div class="form-group">
        <label class="form-label-text">Email</label>
        <input class="input-pill" type="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label-text">Password</label>
        <div class="input-with-icon">
          <input class="input-pill" type="password" placeholder="Password">
          <span class="icon-right">👁</span>
        </div>
      </div>

      <div class="remember-row">
        <label class="checkbox-label">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="link-primary">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-block">Sign In</button>

      <p class="text-center text-sm mt-4">
        Don't have an account?&nbsp;<a href="sign-up.html" class="link-secondary">Sign Up</a>
      </p>

    </div>
  </div>
</div>

<div class="info-btn">i</div>

</body>
</html>
