<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-centered" style="padding-top: var(--sp-6);">
  <div class="card-panel">
    <div class="card-panel-accent"></div>
    <div class="card-panel-body">

      <h1 class="form-title">Join the board</h1>
      <p class="form-subtitle">Create your account</p>

      <div class="form-group">
        <label class="form-label-text">First Name</label>
        <input class="input-pill" type="text" placeholder="">
      </div>

      <div class="form-group">
        <label class="form-label-text">Last Name</label>
        <input class="input-pill" type="text" placeholder="">
      </div>

      <div class="form-group">
        <label class="form-label-text">Email</label>
        <input class="input-pill" type="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label-text">Password</label>
        <div class="input-with-icon">
          <input class="input-pill" type="password" placeholder="Password">
          <span class="icon-right">👁</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label-text">Confirm Password</label>
        <div class="input-with-icon">
          <input class="input-pill" type="password" placeholder="Confirm Password">
          <span class="icon-right">👁</span>
        </div>
      </div>

      <button class="btn btn-primary btn-block">Create Account</button>

      <p class="text-center text-sm mt-4">
        Already have an account?&nbsp;<a href="sign-in.html" class="link-secondary">Sign In</a>
      </p>

    </div>
  </div>
</div>

</body>
</html>
