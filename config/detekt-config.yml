complexity:
  excludes:
    - '**/build/generated/**'
  LongParameterList:
    ignoreAnnotated: [ 'Composable', 'Test' ]
    active: true
    allowedFunctionParameters: 12
    allowedConstructorParameters: 12
    ignoreDefaultParameters: false
    ignoreDataClasses: true
    ignoreAnnotatedParameter: []
  LongMethod:
    ignoreAnnotated: [ 'Composable', 'Preview', 'ScreenPreviews', 'ComponentPreviews', 'Test' ]
  CyclomaticComplexMethod:
    ignoreAnnotated: [ 'Composable' ]
  TooManyFunctions:
    active: false
    ignoreAnnotated: [ 'Module' ]

exceptions:
  excludes:
    - '**/build/generated/**'
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: false

naming:
  excludes:
    - '**/build/generated/**'
  FunctionNaming:
    ignoreAnnotated: [ 'Composable', 'ScreenPreviews', 'ComponentPreviews', 'Test' ]
  PackageNaming:
    active: false
  MatchingDeclarationName:
    active: false

comments:
  excludes:
    - '**/build/generated/**'
  UndocumentedPublicClass:
    active: true
    ignoreDefaultCompanionObject: true
  UndocumentedPublicFunction:
    ignoreAnnotated: [ 'Preview', 'ScreenPreviews', 'ComponentPreviews' ]
    active: true
  UndocumentedPublicProperty:
    active: false

style:
  excludes:
    - '**/build/generated/**'
  ForbiddenComment:
    active: false
  MagicNumber:
    ignoreAnnotated: [ 'Preview', 'ScreenPreviews', 'ComponentPreviews', 'Test' ]
  ReturnCount:
    active: true
    max: 8
  MaxLineLength:
    active: false
  # UnusedPrivateMember was split into UnusedPrivateClass, UnusedPrivateFunction, UnusedPrivateProperty in detekt 2.0
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:
    ignoreAnnotated: [ 'Preview' ]
    active: true
  UnusedPrivateProperty:
    ignoreAnnotated: [ 'Preview' ]
    active: true
  ThrowsCount:
    active: true
    max: 10

coroutines:
  excludes:
    - '**/build/generated/**'
  InjectDispatcher:
    ignoreAnnotated: [ 'BackgroundDispatcher', 'UIThreadDispatcher' ]

# ktlint-wrapper rules (detekt 2.0 alpha exposes them under ruleset id `ktlint`).
# Ruleset is enabled so that autoCorrect-capable rules can rewrite code,
# but every rule is opt-in: only NoUnusedImports is active. To enable
# additional formatting autofixes, flip the relevant rule's `active` flag
# to true. See the ktlint-wrapper jar's bundled config/config.yml for the
# full list of rules and their default options.
ktlint:
  active: true
  autoCorrect: true
  excludes:
    - '**/build/generated/**'
  NoUnusedImports:
    active: true
    autoCorrect: true
  AnnotationOnSeparateLine:
    active: true
  AnnotationSpacing:
    active: true
  ArgumentListWrapping:
    active: true
    ignoreAnnotated: [ 'Test' ]
  BackingPropertyNaming:
    active: false
  BinaryExpressionWrapping:
    active: true
  BlankLineBeforeDeclaration:
    active: true
  BlankLineBetweenWhenConditions:
    active: true
  BlockCommentInitialStarAlignment:
    active: false
  ChainMethodContinuation:
    active: true
    ignoreAnnotated: [ 'Test' ]
  ChainWrapping:
    active: true
    ignoreAnnotated: [ 'Test' ]
  ClassName:
    active: true
  ClassSignature:
    active: true
  CommentSpacing:
    active: true
  CommentWrapping:
    active: true
  ConditionWrapping:
    active: true
  ContextReceiverListWrapping:
    active: true
  ContextReceiverMapping:
    active: true
  EnumEntryNameCase:
    active: true
  EnumWrapping:
    active: true
  ExpressionOperandWrapping:
    active: true
  Filename:
    active: true
  FinalNewline:
    active: true
  FunKeywordSpacing:
    active: true
  FunctionExpressionBody:
    active: false
  FunctionLiteral:
    active: true
  FunctionName:
    active: true
    ignoreAnnotated: [ 'Composable', 'Preview', 'Test' ]
  FunctionReturnTypeSpacing:
    active: false
  FunctionSignature:
    active: false
  FunctionStartOfBodySpacing:
    active: true
  FunctionTypeModifierSpacing:
    active: true
  FunctionTypeReferenceSpacing:
    active: true
  IfElseBracing:
    active: true
  IfElseWrapping:
    active: true
  ImportOrdering:
    active: true
  Indentation:
    active: true
  Kdoc:
    active: true
  KdocWrapping:
    active: true
  MaximumLineLength:
    active: true
    ignoreAnnotated: [ 'Preview', 'Test' ]
  MixedConditionOperators:
    active: true
  ModifierListSpacing:
    active: true
  ModifierOrdering:
    active: true
  MultiLineIfElse:
    active: true
  MultilineExpressionWrapping:
    active: true
    ignoreAnnotated: [ 'Test' ]
  MultilineLoop:
    active: true
  NoBlankLineBeforeRbrace:
    active: true
  NoBlankLineInList:
    active: true
  NoBlankLinesInChainedMethodCalls:
    active: true
  NoConsecutiveBlankLines:
    active: true
  NoConsecutiveComments:
    active: true
  NoEmptyClassBody:
    active: true
  NoEmptyFile:
    active: true
  NoEmptyFirstLineInClassBody:
    active: true
  NoEmptyFirstLineInMethodBlock:
    active: true
  NoLineBreakAfterElse:
    active: true
  NoLineBreakBeforeAssignment:
    active: true
  NoMultipleSpaces:
    active: true
  NoSemicolons:
    active: true
  NoSingleLineBlockComment:
    active: true
  NoTrailingSpaces:
    active: true
  NoUnitReturn:
    active: false
  NoWildcardImports:
    active: true
  NullableTypeSpacing:
    active: true
  PackageName:
    active: true
  ParameterListSpacing:
    active: true
  ParameterListWrapping:
    active: true
  ParameterWrapping:
    active: true
    ignoreAnnotated: [ 'Test' ]
  PropertyName:
    active: true
  PropertyWrapping:
    active: true
  SpacingAroundAngleBrackets:
    active: true
  SpacingAroundColon:
    active: true
  SpacingAroundComma:
    active: true
  SpacingAroundCurly:
    active: true
  SpacingAroundDot:
    active: true
  SpacingAroundDoubleColon:
    active: true
  SpacingAroundKeyword:
    active: true
  SpacingAroundOperators:
    active: true
  SpacingAroundParens:
    active: true
  SpacingAroundRangeOperator:
    active: true
  SpacingAroundSquareBrackets:
    active: true
  SpacingAroundUnaryOperator:
    active: true
  SpacingBetweenDeclarationsWithAnnotations:
    active: true
  SpacingBetweenDeclarationsWithComments:
    active: true
  SpacingBetweenFunctionNameAndOpeningParenthesis:
    active: true
  StatementWrapping:
    active: true
  StringTemplate:
    active: true
  StringTemplateIndent:
    active: true
  ThenSpacing:
    active: true
  TrailingCommaOnCallSite:
    active: true
  TrailingCommaOnDeclarationSite:
    active: true
  TryCatchFinallySpacing:
    active: true
  TypeArgumentComment:
    active: true
  TypeArgumentListSpacing:
    active: true
  TypeParameterComment:
    active: true
  TypeParameterListSpacing:
    active: true
  UnnecessaryParenthesesBeforeTrailingLambda:
    active: true
  ValueArgumentComment:
    active: true
  ValueParameterComment:
    active: true
  WhenEntryBracing:
    active: true
  Wrapping:
    active: true

empty-blocks:
  excludes:
    - '**/build/generated/**'
