<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Properties</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar__title">Properties</span>
        <div class="top-bar__actions">
          <a href="add-property.html" class="top-bar__icon-btn" aria-label="Add property">+</a>
        </div>
      </div>

      <div class="screen-content">

        <!-- Search Bar -->
        <div class="search-bar">
          <div class="search-bar__input">
            <span class="search-bar__icon">&#128269;</span>
            <input type="text" placeholder="Search properties...">
          </div>
        </div>

        <div class="px-4 pb-6">

          <!-- Residential Section (Expanded) -->
          <div class="section-header" onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('.section-header__toggle').classList.toggle('section-header__toggle--open');">
            <span>Residential (8)</span>
            <span class="section-header__toggle section-header__toggle--open">&#9660;</span>
          </div>

          <div class="flex-col gap-3 mb-4">
            <a href="property-detail.html" class="card card--clickable">
              <div class="text-h3 mb-1">Sunset Apartments</div>
              <div class="text-small text-secondary">24 units &middot; Downtown</div>
            </a>

            <a href="property-detail.html" class="card card--clickable">
              <div class="text-h3 mb-1">Oak Street Condos</div>
              <div class="text-small text-secondary">12 units &middot; Westside</div>
            </a>

            <a href="property-detail.html" class="card card--clickable">
              <div class="text-h3 mb-1">Maple Gardens</div>
              <div class="text-small text-secondary">8 units &middot; Midtown</div>
            </a>
          </div>

          <!-- Commercial Section (Collapsed) -->
          <div class="section-header" onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('.section-header__toggle').classList.toggle('section-header__toggle--open');">
            <span>Commercial (4)</span>
            <span class="section-header__toggle">&#9660;</span>
          </div>

          <div class="flex-col gap-3 mb-4 hidden">
            <a href="property-detail.html" class="card card--clickable">
              <div class="text-h3 mb-1">Commerce Plaza</div>
              <div class="text-small text-secondary">6 units &middot; Business District</div>
            </a>
          </div>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
