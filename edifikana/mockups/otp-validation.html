<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Verify Email</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="top-bar">
        <a href="sign-up.html" class="top-bar__back">&#8592; Back</a>
      </div>

      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: 0;">

          <div style="font-size: 48px; margin-bottom: var(--space-4);">&#128231;</div>
          <h1 class="text-h1 mb-2">Verify your email</h1>
          <p class="text-body text-secondary mb-6" style="text-align: center; max-width: 300px;">
            We sent a 6-digit code to <strong>you@example.com</strong>. Enter it below to confirm your account.
          </p>

          <form class="auth-form">
            <div class="form-group">
              <label class="form-label" for="otp">Verification Code</label>
              <input class="input" type="text" id="otp" placeholder="123456" inputmode="numeric" maxlength="6"
                style="text-align: center; letter-spacing: 10px; font-size: var(--font-size-h1); font-weight: 600;">
              <div class="form-hint">Check your spam folder if you don&rsquo;t see it.</div>
            </div>

            <div class="form-group">
              <a href="organization-picker.html" class="btn btn-primary btn--full-width">Verify Email</a>
            </div>
          </form>

          <div class="auth-footer">
            Didn&rsquo;t receive a code?
            <a href="#" onclick="return false;">Resend</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
