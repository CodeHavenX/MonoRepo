name: Scheduled Deployment

on:
  schedule:
    - cron: '0 8 * * *'  # 00:00 PST (UTC-8)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  stage:
    runs-on: self-hosted
    environment: "stage"
    env:
      SUPABASE_DB_PASSWORD : ${{ secrets.EDIFIKANA_SUPABASE_DB_PASSWORD  }}
      PROJECT_ID: ${{ secrets.EDIFIKANA_PROJECT_ID }}
      EDIFIKANA_SUPABASE_URL: ${{ secrets.EDIFIKANA_SUPABASE_URL }}
      EDIFIKANA_SUPABASE_KEY: ${{ secrets.EDIFIKANA_SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      # Link the project to the Supabase CLI
      - run: scripts/edifikana_link_project.sh
      # Build the project. We do this first since building can take a while
      - name: Run assemble with Gradle
        run: ./gradlew edifikana:back-end:assemble
      # Push the DB changes to Supabase
      - run: scripts/edifikana_push_changes.sh
      # Run the integration tests
      - name: Run integration tests with Gradle
        run: ./gradlew edifikana:back-end:integTest --rerun
  build-containers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and stage container images
      run: ./scripts/build_images.sh
  push-containers:
    runs-on: ubuntu-latest
    needs: [build-containers, stage]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Promote staged images to final tags
      run: ./scripts/promote_images.sh
  notify:
    runs-on: ubuntu-latest
    environment: "Coolify"
    needs: push-containers
    steps:
    - name: Invoke deployment hook
      uses: distributhor/workflow-webhook@v3
      with:
        webhook_url: ${{ vars.WEBHOOK_URL }}
        webhook_auth_type: "bearer"
        webhook_auth: ${{ secrets.WEBHOOK_AUTH }}
