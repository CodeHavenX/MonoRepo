<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Occupant Detail</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="occupant-list.html" class="top-bar__back">&larr;</a>
        <span class="top-bar__title">Occupant Detail</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Avatar & Name -->
          <div class="flex-col items-center text-center mb-4 pt-4">
            <div class="avatar avatar--xl mb-3">SM</div>
            <div class="text-h1 mb-2">Sarah Martinez</div>
            <span class="badge badge-info">Primary Contact</span>
          </div>

          <!-- Info Card -->
          <div class="card mb-4">
            <div class="info-row">
              <span class="info-row__label">Email</span>
              <span class="info-row__value">sarah@email.com</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Phone</span>
              <span class="info-row__value">(555) 234-5678</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Type</span>
              <span class="info-row__value">Tenant</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Unit</span>
              <a href="unit-detail.html" class="info-row__value text-link">204</a>
            </div>
            <div class="info-row">
              <span class="info-row__label">Start Date</span>
              <span class="info-row__value">Jan 1, 2025</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Status</span>
              <span class="badge badge-success">Active</span>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Remove Occupant -->
          <div class="mt-4">
            <button class="btn btn-danger btn--full-width mb-2">Remove Occupant</button>
            <p class="text-small text-secondary text-center">This will remove the occupant from Unit 204</p>
          </div>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
