<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Accept Invitation</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: var(--space-10);">
          <div class="auth-logo">Edifikana</div>
          <h1 class="text-h1 mb-6">You&rsquo;ve been invited!</h1>

          <div class="auth-form">

            <!-- Invitation details card -->
            <div class="card mb-4">
              <div class="flex-col gap-3">
                <div>
                  <div class="text-caption text-muted">Organization</div>
                  <div class="text-body text-bold">Sunrise Property Management</div>
                </div>
                <div>
                  <div class="text-caption text-muted">Role</div>
                  <div class="text-body text-bold">Staff</div>
                </div>
                <div class="divider" style="margin: 0;"></div>
                <div class="text-small text-secondary">Invited by: Admin User</div>
              </div>
            </div>

            <!-- Account path tab switcher -->
            <div class="tab-bar mb-4" style="border-radius: var(--radius-md); overflow: hidden;">
              <button class="tab tab--active" data-path="new-account">New Account</button>
              <button class="tab" data-path="existing-account">I have an account</button>
            </div>

            <!-- New Account Path -->
            <div id="new-account" class="path-panel">
              <form>
                <div class="form-group">
                  <label class="form-label" for="full-name">Full Name</label>
                  <input class="input" type="text" id="full-name" placeholder="Jane Smith" value="Jane Smith" autocomplete="name">
                </div>

                <div class="form-group">
                  <label class="form-label" for="email">Email</label>
                  <input class="input" type="email" id="email" value="jane.smith@example.com" disabled style="opacity: 0.7; cursor: not-allowed;">
                </div>

                <div class="form-group">
                  <label class="form-label" for="password">Create Password</label>
                  <input class="input" type="password" id="password" placeholder="Create a password" autocomplete="new-password">
                </div>

                <div class="form-group">
                  <label class="form-label" for="confirm-password">Confirm Password</label>
                  <input class="input" type="password" id="confirm-password" placeholder="Confirm your password" autocomplete="new-password">
                </div>

                <div class="form-group">
                  <a href="dashboard.html" class="btn btn-primary btn--full-width">Accept &amp; Create Account</a>
                </div>
              </form>
            </div>

            <!-- Existing Account Path -->
            <div id="existing-account" class="path-panel" style="display: none;">
              <div class="card mb-4" style="background: var(--color-primary-50); border-color: var(--color-primary-300);">
                <p class="text-small" style="color: var(--color-primary-700);">
                  You&rsquo;ll be signed in and added to <strong>Sunrise Property Management</strong> as Staff.
                </p>
              </div>

              <form>
                <div class="form-group">
                  <label class="form-label" for="existing-email">Email</label>
                  <input class="input" type="email" id="existing-email" value="jane.smith@example.com" disabled style="opacity: 0.7; cursor: not-allowed;">
                </div>

                <div class="form-group">
                  <label class="form-label" for="existing-password">Password</label>
                  <input class="input" type="password" id="existing-password" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div class="form-group">
                  <a href="dashboard.html" class="btn btn-primary btn--full-width">Sign In &amp; Accept</a>
                </div>
              </form>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-bar .tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const path = tab.dataset.path;
        document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('tab--active'));
        tab.classList.add('tab--active');
        document.querySelectorAll('.path-panel').forEach(p => p.style.display = 'none');
        document.getElementById(path).style.display = 'block';
      });
    });
  </script>
</body>
</html>
