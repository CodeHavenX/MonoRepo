<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — New Flyer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-page">
  <div class="detail-container">

    <a href="my-flyers.html" class="detail-back">← My Flyers</a>

    <div class="detail-columns">

      <!-- Left: upload zone -->
      <div class="detail-image-col">
        <div class="form-upload-zone">
          <span class="form-upload-icon">☁️</span>
          <p class="form-upload-text">Drag &amp; drop your flyer here,<br>or click to browse</p>
          <p class="form-upload-hint">JPG, PNG or PDF · Max 10 MB</p>
        </div>
      </div>

      <!-- Right: form fields -->
      <div class="detail-content-col">
        <h1 class="form-page-title">New Flyer</h1>
        <p class="form-page-subtitle">Upload your design and reach the neighborhood.</p>

        <div class="input-labeled">
          <span class="label">Title</span>
          <input class="input-rect" type="text" placeholder="Give your flyer a title">
        </div>

        <div class="input-labeled">
          <span class="label">Description</span>
          <textarea class="input-rect textarea" placeholder="What's this flyer about?"></textarea>
        </div>

        <div class="form-group">
          <p class="form-label-text">Category</p>
          <div class="filter-chips">
            <button class="filter-chip active">Events</button>
            <button class="filter-chip">Lost &amp; Found</button>
            <button class="filter-chip">Services</button>
          </div>
        </div>

        <div class="input-labeled">
          <span class="label">Expires on (optional)</span>
          <input class="input-rect" type="text" placeholder="YYYY-MM-DD">
        </div>
        <p class="input-hint mb-6">Flyer will be archived after this date.</p>

        <div class="detail-actions">
          <button class="btn btn-primary">Submit for Review</button>
          <button class="btn btn-outline">Cancel</button>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
