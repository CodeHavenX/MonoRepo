<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Record Payment</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="financial-overview.html" class="top-bar__back">&times;</a>
        <span class="top-bar__title">Record Payment</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Unit Info Card -->
          <div class="card mb-4">
            <div class="flex items-center gap-3">
              <div class="list-item__icon">&#9962;</div>
              <div>
                <div class="text-body text-bold">Unit 204</div>
                <div class="text-small text-secondary">Sunset Apartments</div>
              </div>
            </div>
          </div>

          <!-- Form -->
          <div class="form-group">
            <label class="form-label">Payment Type</label>
            <select class="select">
              <option value="">Select type...</option>
              <option value="rent" selected>Rent</option>
              <option value="hoa">HOA</option>
              <option value="utility">Utility</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Period</label>
            <input type="month" class="input" value="2025-02">
          </div>

          <div class="form-group">
            <label class="form-label">Amount Due</label>
            <input type="text" class="input" value="$1,500.00">
          </div>

          <div class="form-group">
            <label class="form-label">Amount Paid</label>
            <input type="text" class="input" placeholder="$0.00">
          </div>

          <div class="form-group">
            <label class="form-label">Payment Date</label>
            <input type="date" class="input" value="2025-02-08">
          </div>

          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="textarea" placeholder="Any notes about this payment..."></textarea>
          </div>

          <!-- Submit -->
          <button class="btn btn-primary btn--full-width">Record Payment</button>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
