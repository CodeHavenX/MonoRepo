<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Edit Flyer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-page">
  <div class="detail-container">

    <a href="my-flyers.html" class="detail-back">← My Flyers</a>

    <div class="detail-columns">

      <!-- Left: current image preview with replace option -->
      <div class="detail-image-col">
        <div class="detail-image"></div>
        <button class="btn btn-outline form-replace-btn">Replace Image</button>
      </div>

      <!-- Right: form fields -->
      <div class="detail-content-col">
        <h1 class="form-page-title">Edit Flyer</h1>
        <p class="form-page-subtitle">Update your flyer's details below.</p>

        <div class="input-labeled">
          <span class="label">Title</span>
          <input class="input-rect" type="text" value="Community Yard Sale">
        </div>

        <div class="input-labeled">
          <span class="label">Description</span>
          <textarea class="input-rect textarea">Everything must go! Furniture, clothes, books and more.</textarea>
        </div>

        <div class="form-group">
          <p class="form-label-text">Category</p>
          <div class="filter-chips">
            <button class="filter-chip active">Events</button>
            <button class="filter-chip">Lost &amp; Found</button>
            <button class="filter-chip">Services</button>
          </div>
        </div>

        <div class="input-labeled">
          <span class="label">Expires on (optional)</span>
          <input class="input-rect" type="text" value="2026-05-01">
        </div>
        <p class="input-hint mb-6">Flyer will be archived after this date.</p>

        <div class="detail-actions">
          <button class="btn btn-primary">Save Changes</button>
          <button class="btn btn-outline">Cancel</button>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
