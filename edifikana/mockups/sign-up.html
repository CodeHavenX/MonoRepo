<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Sign Up</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="top-bar">
        <a href="sign-in.html" class="top-bar__back">
          &#8592; Back
        </a>
      </div>

      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout" style="justify-content: flex-start; padding-top: 0;">
          <h1 class="text-h1 mb-2">Create Account</h1>
          <p class="text-small text-secondary mb-6">Join Edifikana to manage your properties.</p>

          <!--
            Invite context banner — shown only when this screen is reached from
            invitation-accept.html (i.e. the user tapped an invitation link and doesn't
            have an account yet). Hidden for the normal "Sign Up" entry point from sign-in.html.
            Kept generic (no org name) since there's no unauthenticated endpoint to resolve
            invite details from the token yet.
          -->
          <div class="card mb-4" style="background: var(--color-info-100); border-color: var(--color-info-500);">
            <p class="text-small" style="color: var(--color-text-primary);">
              You&rsquo;re creating an account to accept an invitation.
            </p>
          </div>

          <form class="auth-form">
            <!--
              After OTP verification (otp-validation.html), a user arriving via an invite
              link returns to invitation-accept-authenticated.html to accept/decline instead
              of the normal organization-picker.html destination.
            -->
            <div class="form-group">
              <label class="form-label" for="full-name">Full Name</label>
              <input class="input" type="text" id="full-name" placeholder="John Doe" autocomplete="name">
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input class="input" type="password" id="password" placeholder="Create a password" autocomplete="new-password">
            </div>

            <div class="form-group">
              <label class="form-label" for="confirm-password">Confirm Password</label>
              <input class="input" type="password" id="confirm-password" placeholder="Confirm your password" autocomplete="new-password">
            </div>

            <div class="form-group">
              <a href="otp-validation.html" class="btn btn-primary btn--full-width">Create Account</a>
            </div>
          </form>

          <div class="auth-footer">
            Already have an account? <a href="sign-in.html">Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
