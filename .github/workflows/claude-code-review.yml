name: Claude Code Review

# Runs only after the build/snapshot workflow finishes, so the review never
# fires against a commit that doesn't even build. workflow_run always uses
# this file's copy from the default branch (never the PR's), which also
# means the "PR modifies this workflow file" validation-skip case below can
# no longer happen under this trigger.
on:
  workflow_run:
    workflows: ["Build All Targets Pull Request"]
    types: [completed]

jobs:
  claude-review:
    if: github.event.workflow_run.conclusion == 'success'
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is required or the plugin only prints its findings to the
          # Action log and never posts anything to the PR (see plugins/code-review
          # /commands/code-review.md step 7 in anthropics/claude-code).
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.workflow_run.pull_requests[0].number }} --comment'
          allowed_bots: 'github-actions[bot]'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # claude-code-action reports conclusion "success" whenever Claude finished
      # without an SDK error, even if a tool call was permission-denied mid-run
      # and the review therefore posted nothing. Fail the job explicitly in that
      # case so an incomplete review shows up as a red check, not a false green one.
      - name: Fail if the review was cut short by a permission denial
        if: always() && steps.claude-review.outputs.execution_file != ''
        shell: bash
        run: |
          FILE="${{ steps.claude-review.outputs.execution_file }}"
          RESULT=$(jq -c '[.[] | select(.type == "result")] | last // {}' "$FILE")
          echo "Claude result: $RESULT"
          DENIALS=$(echo "$RESULT" | jq -r '.permission_denials | length // 0')
          if [ "$DENIALS" != "0" ] && [ "$DENIALS" != "null" ]; then
            echo "::error::Claude Code Review hit $DENIALS permission denial(s) mid-run and likely posted an incomplete (or empty) review. Re-run with show_full_output: true to see which tool call was denied."
            exit 1
          fi

