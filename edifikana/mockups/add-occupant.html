<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Add Occupant</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="occupant-list.html" class="top-bar__back">&times;</a>
        <span class="top-bar__title">Add Occupant</span>
        <div class="top-bar__actions"></div>
      </div>

      <div class="screen-content">
        <div class="px-4 pb-6">

          <!-- Form -->
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="input" placeholder="Full name">
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="input" placeholder="email@example.com">
          </div>

          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="input" placeholder="(555) 000-0000">
          </div>

          <div class="form-group">
            <label class="form-label">Occupant Type</label>
            <select class="select">
              <option value="">Select type...</option>
              <option value="tenant">Tenant</option>
              <option value="owner">Owner</option>
              <option value="resident">Resident</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" class="input">
          </div>

          <div class="form-group">
            <div class="toggle-row">
              <div>
                <div class="toggle-label">Primary Contact</div>
                <div class="toggle-sublabel">This person will be the main point of contact</div>
              </div>
              <div class="toggle-switch"></div>
            </div>
          </div>

          <!-- Submit -->
          <button class="btn btn-primary btn--full-width">Add Occupant</button>

        </div>
      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
