<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - My Unit</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
  <div class="app-layout">
        <nav class="sidebar-nav">
      <div class="sidebar-nav__logo">Edifikana</div>
      <a href="resident-home.html" class="sidebar-nav__item sidebar-nav__item--active"><span class="sidebar-nav__icon">&#9750;</span> Home</a>
      <a href="my-documents.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">&#128196;</span> Documents</a>
      <a href="resident-profile.html" class="sidebar-nav__item"><span class="sidebar-nav__icon">&#128100;</span> Profile</a>
    </nav>

<div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="resident-home.html" class="top-bar__back">&larr; My Unit</a>
      </div>

      <div class="screen-content">

        <!-- Unit Header -->
        <div class="px-4 mb-4">
          <h1 class="text-h1 mb-1">Unit 204</h1>
          <div class="text-small text-secondary">Sunset Apartments &middot; 2 bed &middot; 1 bath</div>
        </div>

        <!-- Info Section -->
        <div class="px-4 mb-4">
          <div class="card">
            <div class="info-row">
              <span class="info-row__label">Unit Number</span>
              <span class="info-row__value">204</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Floor</span>
              <span class="info-row__value">2nd</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Bedrooms</span>
              <span class="info-row__value">2</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Bathrooms</span>
              <span class="info-row__value">1</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Sq Ft</span>
              <span class="info-row__value">850</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Move-In Date</span>
              <span class="info-row__value">Jan 1, 2025</span>
            </div>
          </div>
        </div>

        <!-- Lease Information -->
        <div class="px-4 mb-4">
          <div class="card">
            <div class="text-h3 mb-3">Lease</div>
            <div class="info-row">
              <span class="info-row__label">Lease Start</span>
              <span class="info-row__value">Jan 1, 2025</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Monthly Rent</span>
              <span class="info-row__value">$1,500</span>
            </div>
            <div class="info-row">
              <span class="info-row__label">Due Date</span>
              <span class="info-row__value">1st of month</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Bottom Nav -->
      <nav class="bottom-nav">
        <a href="resident-home.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#9750;</span>Home</a>
        <a href="my-documents.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#128196;</span>Documents</a>
        <a href="resident-profile.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#128100;</span>Profile</a>
      </nav>

    </div>
    </div>
</div>
</body>
</html>
