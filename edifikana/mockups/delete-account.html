<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Delete Account</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">

      <!-- Top Bar -->
      <div class="top-bar">
        <a href="settings.html" class="top-bar__back">&#8249; Back</a>
        <span class="top-bar__title">Delete Account</span>
        <div class="top-bar__actions"></div>
      </div>

      <!-- Screen Content -->
      <div class="screen-content" style="display:flex; align-items:center; justify-content:center;">
        <div class="px-4 py-3" style="width:100%; display:flex; justify-content:center;">

          <!-- Modal-style Card -->
          <div class="modal" style="position:static;">
            <div class="modal__title text-center">Account Deletion</div>
            <div class="modal__body text-center">
              To delete your account and all associated data, please contact support:
            </div>
            <div class="text-center mb-6">
              <a href="mailto:support@edifikana.com" class="text-link" style="font-size: var(--font-size-body); font-weight: 600;">support@edifikana.com</a>
            </div>
            <div class="modal__actions" style="justify-content: center; flex-direction: column; gap: 8px;">
              <button class="btn btn-secondary btn--full-width" onclick="navigator.clipboard.writeText('support@edifikana.com')">Copy Email</button>
              <a href="settings.html" class="btn btn-text btn--full-width">Close</a>
            </div>
          </div>

        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9750;</span>Dashboard</a>
        <a href="property-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9962;</span>Properties</a>
        <a href="task-list.html" class="bottom-nav__item"><span class="bottom-nav__icon">&#9745;</span>Tasks</a>
        <a href="settings.html" class="bottom-nav__item bottom-nav__item--active"><span class="bottom-nav__icon">&#8943;</span>More</a>
      </nav>

    </div>
  </div>
</body>
</html>
