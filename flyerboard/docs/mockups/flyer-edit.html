<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyerboard — Edit Flyer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-centered">
  <div class="card-panel">
    <div class="card-panel-accent"></div>
    <div class="card-panel-body">

      <h1 class="form-title">Edit Flyer</h1>
      <p class="form-subtitle">Update your flyer's details below.</p>

      <div class="upload-zone">
        <span class="upload-icon">☁️</span>
        <p class="upload-text">Drag &amp; drop a replacement image or PDF here, or click to browse</p>
        <p class="upload-hint">Max file size: 10MB</p>
      </div>

      <div class="input-labeled mb-4">
        <span class="label">Title</span>
        <input class="input-rect" type="text" value="Community Yard Sale">
      </div>

      <div class="input-labeled mb-4">
        <span class="label">Description</span>
        <textarea class="input-rect textarea">Everything must go! Furniture, clothes, books and more.</textarea>
      </div>

      <div class="input-labeled mb-4">
        <span class="label">Expires At (optional)</span>
        <input class="input-rect" type="text" value="2026-05-01">
      </div>
      <p class="input-hint mb-6">Flyer will be archived after this date.</p>

      <button class="btn btn-primary btn-block">Save</button>
      <button class="btn btn-outline btn-block">Cancel</button>

    </div>
  </div>
</div>

</body>
</html>
