<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edifikana - Check Your Email</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div class="mobile-viewport">
    <div class="screen">
      <div class="screen-content screen-content--no-nav">
        <div class="auth-layout">

          <div style="font-size: 56px; margin-bottom: var(--space-4);">&#128140;</div>
          <h1 class="text-h1 mb-3">Check your email</h1>
          <p class="text-body text-secondary mb-8" style="text-align: center; max-width: 300px;">
            We sent a password reset link to <strong>you@example.com</strong>. Click the link in the email to set a new password.
          </p>

          <div class="auth-form">
            <a href="sign-in.html" class="btn btn-primary btn--full-width">Back to Sign In</a>
          </div>

          <div class="auth-footer">
            Didn&rsquo;t get the email?
            <a href="password-reset.html">Try again</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
